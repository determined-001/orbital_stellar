version: 2

updates:
  - package-ecosystem: pnpm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      dev-dependencies:
        dependency-type: development

  # apps/web
  - package-ecosystem: pnpm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3

  # apps/server
  - package-ecosystem: pnpm
    directory: /apps/server
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3

  # packages/pulse-core — was missing, added to cover @stellar/stellar-sdk etc.
  - package-ecosystem: pnpm
    directory: /packages/pulse-core
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3

  # packages/pulse-webhooks — was missing
  - package-ecosystem: pnpm
    directory: /packages/pulse-webhooks
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3

  # packages/pulse-notify — was missing
  - package-ecosystem: pnpm
    directory: /packages/pulse-notify
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3

  # GitHub Actions — bumped pnpm/action-setup to v4 via Dependabot coverage
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3